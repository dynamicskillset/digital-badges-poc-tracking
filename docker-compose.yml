services:
  # Reverse proxy - entry point for all external traffic
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
      network: host
    image: digital-badges-nginx:local
    container_name: digital-badges-nginx
    entrypoint: ["/usr/local/bin/nginx-entrypoint.sh"]
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/docker-entrypoint.sh:/usr/local/bin/nginx-entrypoint.sh:ro
      - acme-certs:/etc/nginx/certs
    depends_on:
      orca:
        condition: service_healthy
      transaction-service:
        condition: service_started
    networks:
      - digital-badges-network
    restart: unless-stopped

  # acme.sh - Let's Encrypt cert issuance + renewal via Mythic Beasts
  # DNS-01 challenge. The container exits between commands; renewal is
  # invoked from host cron (see scripts/issue-certs.sh and the README
  # runbook). We do NOT run acme.sh in --daemon mode because the host
  # cron command also needs to reload nginx after renewal, and that's
  # cleaner orchestrated outside the acme container.
  acme:
    image: neilpang/acme.sh
    container_name: digital-badges-acme
    env_file:
      - .env.acme
    volumes:
      - acme-state:/acme.sh
      - acme-certs:/certs
    networks:
      - acme-egress
    # No restart policy: this container is invoked via `docker compose
    # run` for issuance and renewal, not run continuously. We keep the
    # image's default ENTRYPOINT ["/entry.sh"], which execs
    # `acme.sh "$@"`, so callers pass acme.sh flags directly, e.g.
    # `docker compose run --rm -T acme --issue -d ...`.
    profiles: ["tools"]

  # Transaction Service - External API for wallet flows
  transaction-service:
    image: skybridgeskills/dcc-transaction-service:latest
    container_name: digital-badges-transaction
    env_file:
      - .env.transaction
    depends_on:
      - redis
      - signing-service
    networks:
      - digital-badges-network
    restart: unless-stopped

  # Signing Service - Internal only, not exposed externally
  signing-service:
    image: skybridgeskills/dcc-signing-service:latest
    container_name: digital-badges-signing
    env_file:
      - .env.signing
    networks:
      - digital-badges-network
    restart: unless-stopped

  # ORCA - Skybridge Skills staff workflows + learner claim/credential UI.
  # Reachable on tenant subdomains "<org>.digitalbadges.scot" via nginx
  # (routing added in a separate phase). Apex digitalbadges.scot is
  # intentionally not routed to ORCA.
  orca:
    image: skybridgeskills/orca:latest
    container_name: digital-badges-orca
    env_file:
      - .env.orca
    depends_on:
      postgres:
        condition: service_healthy
      mail:
        condition: service_started
    volumes:
      - orca-uploads:/app/dev-uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - digital-badges-network
    restart: unless-stopped

  # Postgres - Persistence layer for ORCA (internal only, not exposed externally)
  postgres:
    image: postgres:16-alpine
    container_name: digital-badges-postgres
    env_file:
      - .env.postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orcaadmin} -d ${POSTGRES_DB:-orca}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - digital-badges-network
    restart: unless-stopped

  # Redis - Ephemeral cache
  redis:
    image: redis:7-alpine
    container_name: digital-badges-redis
    command: redis-server --appendonly no
    networks:
      - digital-badges-network
    restart: unless-stopped

  # Mail - Send-only SMTP relay (Postfix). Internal only, not exposed
  # externally. ORCA connects over the compose bridge on SMTP :587
  # with AUTH and hands off messages. Outbound behaviour:
  #   - Default: direct-to-MX on port 25 egress from the PoC host.
  #   - Optional smarthost: set RELAYHOST (+ RELAYHOST_USERNAME /
  #     RELAYHOST_PASSWORD) in .env.mail to relay upstream. See the
  #     plan in docs/plans/2026-04-26-orca-self-hosted-smtp/ for
  #     design and deliverability notes.
  # The envelope sender (MAIL FROM) is rewritten to
  # notifications@digitalbadges.scot via the mounted regexp map below;
  # the RFC 5322 From: header remains whatever the application passes.
  mail:
    image: boky/postfix:v5.1.0@sha256:aafc772384232497bed875e1eb66b4d3e54ba1ebc86e2e185a6dc1dbc48182ef
    container_name: digital-badges-mail
    env_file:
      - .env.mail
    volumes:
      - ./postfix/sender_canonical:/etc/postfix/sender_canonical:ro
    networks:
      - digital-badges-network
    restart: unless-stopped

networks:
  digital-badges-network:
    driver: bridge
  # acme-egress: dedicated bridge for the acme.sh tools container.
  # DNS-01 via Mythic Beasts only needs outbound internet; this network
  # keeps acme.sh off the same bridge as postgres / orca / signing /
  # transaction-service to reduce blast radius if the upstream image
  # were ever compromised.
  acme-egress:
    driver: bridge

volumes:
  postgres-data:
  orca-uploads:
  acme-state:    # acme.sh account, config, intermediate state
  acme-certs:    # installed cert + key (shared read-only with nginx)
