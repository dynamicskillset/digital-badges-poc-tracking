name: Deploy to POC Server

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: true
        default: "main"

env:
  DEPLOY_HOST: ${{ vars.SSH_HOST }}
  DEPLOY_USER: ${{ vars.SSH_USER }}
  DEPLOY_DIR: /opt/digital-badges

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      deployed_at: ${{ steps.activate.outputs.deployed_at }}
      git_ref: ${{ steps.activate.outputs.git_ref }}
      git_sha: ${{ steps.activate.outputs.git_sha }}
      containers_healthy: ${{ steps.activate.outputs.containers_healthy }}
      containers_total: ${{ steps.activate.outputs.containers_total }}
      rollback_available: ${{ steps.activate.outputs.rollback_available }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Render environment files
        run: |
          # Render signing service env file
          cat > .env.signing << 'EOF'
          # Auto-generated from template - DO NOT EDIT MANUALLY
          PORT=4006
          ENABLE_HTTPS_FOR_DEV=false
          TENANT_SEED_DEFAULT=${{ secrets.SIGN_TENANT_SEED_DEFAULT }}
          TENANT_SEED_TESTING=${{ secrets.SIGN_TENANT_SEED_TESTING }}
          TENANT_SEED_AWARDSNETWORK=${{ secrets.SIGN_TENANT_SEED_AWARDSNETWORK }}
          HEALTH_CHECK_SERVICE_URL=http://localhost:4006/healthz
          HEALTH_CHECK_SERVICE_NAME=signing-service
          EOF

          # Render transaction service env file
          cat > .env.transaction << 'EOF'
          # Auto-generated from template - DO NOT EDIT MANUALLY
          DEFAULT_EXCHANGE_HOST=http://localhost:4004
          REDIS_URI=redis://redis:6379
          KEYV_WRITE_DELAY=50
          TENANT_TOKEN_DEFAULT=${{ secrets.API_TENANT_TOKEN_DEFAULT }}
          TENANT_TOKEN_TESTING=${{ secrets.API_TENANT_TOKEN_TESTING }}
          TENANT_TOKEN_AWARDSNETWORK=${{ secrets.API_TENANT_TOKEN_AWARDSNETWORK }}
          ACCESS_JWT_SECRET=${{ secrets.API_ACCESS_JWT_SECRET }}
          EOF

          # Render postgres env file
          cat > .env.postgres << 'EOF'
          # Auto-generated from template - DO NOT EDIT MANUALLY
          POSTGRES_USER=orcaadmin
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=orca
          EOF

          # Render orca env file
          cat > .env.orca << 'EOF'
          # Auto-generated from template - DO NOT EDIT MANUALLY
          DATABASE_SERVERLESS="false"
          DATABASE_URL="postgresql://orcaadmin:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/orca?schema=orca_public"
          DATABASE_URL_DIRECT="postgresql://orcaadmin:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/orca?schema=orca_public"
          PUBLIC_HTTP_PROTOCOL="https"
          USE_SECURE_COOKIES="true"
          DEFAULT_ORG_ENABLED="false"
          DEFAULT_ORG_DOMAIN=""
          PUBLIC_MEDIA_DOMAIN="/media"
          ORG_CONFIG_ENCRYPTION_KEY=${{ secrets.ORCA_ORG_CONFIG_ENCRYPTION_KEY }}
          MAILGUN_API_KEY="none"
          MAILGUN_DOMAIN=""
          MAILGUN_HOST=""
          SMTP_HOST="mail"
          SMTP_PORT="587"
          SMTP_SECURE="false"
          SMTP_USER=${{ secrets.MAIL_SMTP_USERNAME }}
          SMTP_PASSWORD=${{ secrets.MAIL_SMTP_PASSWORD }}
          EOF

          # Render acme env file. MB_AK / MB_AS are the env var names the
          # current acme.sh dnsapi/dns_mythic_beasts.sh hook reads (OAuth2
          # key id + secret for Mythic Beasts' Primary API v2). The
          # ACME_MYTHICBEASTS_* GH names are retained as the source side so
          # operators don't have to rotate the GH var / secret when the
          # upstream hook's env var names change.
          cat > .env.acme << 'EOF'
          # Auto-generated from template - DO NOT EDIT MANUALLY
          MB_AK="${{ vars.ACME_MYTHICBEASTS_USERNAME }}"
          MB_AS="${{ secrets.ACME_MYTHICBEASTS_PASSWORD }}"
          LE_EMAIL="${{ vars.ACME_LE_EMAIL }}"
          ACME_DOMAIN_LIST="-d digitalbadges.scot -d *.digitalbadges.scot"
          EOF

          # Render mail env file. boky/postfix reads SMTP_USERNAME /
          # SMTP_PASSWORD for inbound AUTH (used by ORCA on the compose
          # bridge). POSTFIX_sender_canonical_* and
          # ALLOW_EMPTY_SENDER_DOMAINS are configuration-only values
          # that don't depend on secrets; they are kept here so the
          # rendered file is self-contained (not split across template
          # and secret). RELAYHOST (smarthost) is intentionally not
          # rendered in CI: the PoC default is direct-to-MX, and any
          # smarthost override is a host-side operator decision.
          cat > .env.mail << 'EOF'
          # Auto-generated from template - DO NOT EDIT MANUALLY
          SMTP_USERNAME=${{ secrets.MAIL_SMTP_USERNAME }}
          SMTP_PASSWORD=${{ secrets.MAIL_SMTP_PASSWORD }}
          ALLOW_EMPTY_SENDER_DOMAINS=1
          POSTFIX_sender_canonical_classes=envelope_sender
          POSTFIX_sender_canonical_maps=regexp:/etc/postfix/sender_canonical
          POSTFIX_smtpd_tls_security_level=none
          EOF

      - name: Prepare deployment package
        run: |
          # Create deployment directory structure
          mkdir -p deploy
          cp docker-compose.yml deploy/
          cp .env.signing deploy/
          cp .env.transaction deploy/
          cp .env.orca deploy/
          cp .env.postgres deploy/
          cp .env.mail deploy/
          cp .env.acme deploy/
          cp -r nginx deploy/
          cp -r scripts deploy/

          # Add deployment metadata
          echo "DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > deploy/.deploy
          echo "GIT_REF=${{ github.event.inputs.git_ref }}" >> deploy/.deploy
          echo "GIT_SHA=$(git rev-parse HEAD)" >> deploy/.deploy

      - name: Install rsync
        run: sudo apt-get install -y rsync

      - name: Deploy to server (atomic rsync)
        run: |
          # Sync to staging directory on server
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            deploy/ \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}/staging/

      - name: Activate deployment
        id: activate
        run: |
          # Run remote deployment with enhanced logging
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'REMOTE_SCRIPT'
            set -e

            echo "::group::📁 Atomic deployment swap"
            # Move current to rollback (for potential rollback)
            if [ -d "${{ env.DEPLOY_DIR }}/current" ]; then
              if [ -d "${{ env.DEPLOY_DIR }}/rollback" ]; then
                echo "::warning::Overwriting existing rollback directory"
                rm -rf "${{ env.DEPLOY_DIR }}/rollback"
              fi
              mv "${{ env.DEPLOY_DIR }}/current" "${{ env.DEPLOY_DIR }}/rollback"
              echo "::notice::Rollback snapshot created at ${{ env.DEPLOY_DIR }}/rollback"
            else
              echo "::notice::No previous deployment to rollback to"
            fi

            # Move staging to current (atomic)
            mv "${{ env.DEPLOY_DIR }}/staging" "${{ env.DEPLOY_DIR }}/current"
            echo "::notice::Activation complete - staging moved to current"
            echo "::endgroup::"

            cd "${{ env.DEPLOY_DIR }}/current"

            echo "::group::🔨 Building local images"
            docker compose build nginx
            echo "::endgroup::"

            echo "::group::📥 Pulling registry images"
            docker compose pull --ignore-buildable
            echo "::endgroup::"

            echo "::group::🚀 Restarting services"
            docker compose down
            docker compose up -d
            echo "::endgroup::"

            echo "::group::⏳ Waiting for services to settle"
            # compose up -d returns as soon as the start commands have been dispatched;
            # give the scheduler a few seconds before the first status read.
            sleep 5
            echo "::endgroup::"

            echo "::group::✅ Verifying deployment"
            # Poll docker compose ps --format json until every container is either
            # OK (running, healthy, or declared no healthcheck) or we hit a firm
            # failure (exited/dead/restarting/unhealthy). --all so we also notice
            # containers that exited before the first poll.
            MAX_WAIT_SECONDS=90
            POLL_INTERVAL=5
            ELAPSED=0
            VERIFY_OUTCOME="pending"
            CLASSIFIER_SUMMARY=""

            while :; do
              PS_JSON=$(docker compose ps --format json --all 2>/dev/null || true)

              # docker compose ps --format json prints either:
              #   - a JSON array of objects (newer compose), or
              #   - one JSON object per line (older compose).
              # jq -s '.' normalises the per-line form into an array; if it's
              # already an array, jq passes it through (wrapped in an outer
              # array, so we unwrap with `.[0]` when appropriate). To keep
              # parsing robust across both shapes, we pipe through
              # `jq -cs 'flatten(1)'` which always yields an array of objects.
              CLASSIFIER_SUMMARY=$(printf '%s\n' "$PS_JSON" | jq -cs 'flatten(1) | map({
                name: (.Name // .Service // "unknown"),
                service: (.Service // "unknown"),
                state: (.State // ""),
                health: (.Health // "")
              }) | map(. + {bucket:
                (if (.state == "exited" or .state == "dead") then "fail"
                 elif (.state == "restarting") then "fail"
                 elif (.health == "unhealthy") then "fail"
                 elif (.health == "starting") then "wait"
                 else "ok" end)
              })')

              FAIL_COUNT=$(printf '%s' "$CLASSIFIER_SUMMARY" | jq '[.[] | select(.bucket == "fail")] | length')
              WAIT_COUNT=$(printf '%s' "$CLASSIFIER_SUMMARY" | jq '[.[] | select(.bucket == "wait")] | length')
              OK_COUNT=$(printf   '%s' "$CLASSIFIER_SUMMARY" | jq '[.[] | select(.bucket == "ok")]   | length')
              TOTAL_COUNT=$(printf '%s' "$CLASSIFIER_SUMMARY" | jq 'length')

              if [ "$FAIL_COUNT" -gt 0 ]; then
                VERIFY_OUTCOME="fail"
                break
              fi

              if [ "$WAIT_COUNT" -eq 0 ] && [ "$TOTAL_COUNT" -gt 0 ]; then
                VERIFY_OUTCOME="ok"
                break
              fi

              if [ "$ELAPSED" -ge "$MAX_WAIT_SECONDS" ]; then
                VERIFY_OUTCOME="timeout"
                break
              fi

              echo "waiting: ok=${OK_COUNT} starting=${WAIT_COUNT} fail=${FAIL_COUNT} total=${TOTAL_COUNT} (elapsed=${ELAPSED}s)"
              sleep "$POLL_INTERVAL"
              ELAPSED=$((ELAPSED + POLL_INTERVAL))
            done

            # Human-readable per-container line for logs and step summary.
            CLASSIFIER_LINES=$(printf '%s' "$CLASSIFIER_SUMMARY" | jq -r '.[] | "\(.service)\t\(.state)\t\(.health)\t\(.bucket)"')

            echo "Container classification:"
            printf '%s\n' "$CLASSIFIER_LINES"

            # Write summary file for retrieval by the host runner.
            cat > .deploy-summary << SUMMARY_EOF
          ## Deployment Summary

          | Property | Value |
          |----------|-------|
          | Deployed At | $(grep DEPLOYED_AT .deploy | cut -d= -f2) |
          | Git Ref | $(grep GIT_REF .deploy | cut -d= -f2) |
          | Git SHA | $(grep GIT_SHA .deploy | cut -d= -f2) |
          | Containers Healthy | ${OK_COUNT}/${TOTAL_COUNT} |
          | Rollback Available | $(test -d "${{ env.DEPLOY_DIR }}/rollback" && echo "Yes" || echo "No") |

          ### Container Status

          \`\`\`
          $(docker compose ps)
          \`\`\`

          ### Verifier Classification

          \`\`\`
          service	state	health	bucket
          ${CLASSIFIER_LINES}
          \`\`\`
          SUMMARY_EOF

            # Machine-readable outputs consumed by the host runner.
            echo "DEPLOYED_AT=$(grep DEPLOYED_AT .deploy | cut -d= -f2)" >> .deploy-outputs
            echo "GIT_REF=$(grep GIT_REF .deploy | cut -d= -f2)" >> .deploy-outputs
            echo "GIT_SHA=$(grep GIT_SHA .deploy | cut -d= -f2)" >> .deploy-outputs
            echo "CONTAINERS_HEALTHY=${OK_COUNT}" >> .deploy-outputs
            echo "CONTAINERS_TOTAL=${TOTAL_COUNT}" >> .deploy-outputs
            if [ -d "${{ env.DEPLOY_DIR }}/rollback" ]; then
              echo "ROLLBACK_AVAILABLE=true" >> .deploy-outputs
            else
              echo "ROLLBACK_AVAILABLE=false" >> .deploy-outputs
            fi

            # Final pass/fail decision.
            case "$VERIFY_OUTCOME" in
              ok)
                echo "::notice::All ${TOTAL_COUNT} containers OK - deployment successful (${OK_COUNT} OK, 0 failing, 0 starting)"
                echo "::endgroup::"
                ;;
              fail)
                echo "::error::Deployment verification failed - ${FAIL_COUNT} of ${TOTAL_COUNT} container(s) in a bad state (ok=${OK_COUNT}, starting=${WAIT_COUNT})"
                docker compose logs --tail=50
                echo "::endgroup::"
                exit 1
                ;;
              timeout)
                echo "::error::Deployment verification timed out after ${MAX_WAIT_SECONDS}s - ${WAIT_COUNT} of ${TOTAL_COUNT} container(s) still 'starting' (ok=${OK_COUNT}, fail=${FAIL_COUNT})"
                docker compose logs --tail=50
                echo "::endgroup::"
                exit 1
                ;;
              *)
                echo "::error::Deployment verification in unknown state: ${VERIFY_OUTCOME}"
                docker compose logs --tail=50
                echo "::endgroup::"
                exit 1
                ;;
            esac
          REMOTE_SCRIPT

          # Fetch outputs from remote server
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "cat ${{ env.DEPLOY_DIR }}/current/.deploy-outputs" > /tmp/deploy_outputs 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "cat ${{ env.DEPLOY_DIR }}/current/.deploy-summary" > /tmp/deploy_summary 2>/dev/null || true

          # Set step outputs
          if [ -f /tmp/deploy_outputs ]; then
            while IFS='=' read -r key value; do
              echo "${key}=${value}" >> $GITHUB_OUTPUT
            done < /tmp/deploy_outputs
          fi

          # Write step summary
          if [ -f /tmp/deploy_summary ]; then
            cat /tmp/deploy_summary >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup
        if: always()
        run: rm -rf ~/.ssh/deploy_key
