events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript;

    upstream transaction_service {
        server transaction-service:4004;
    }

    upstream orca {
        server orca:3000;
    }

    # ─────────────────────────────────────────────────────────────────────
    # :80 - redirect everything to HTTPS.
    # /.well-known/acme-challenge/ is preserved as a no-op location for
    # possible future HTTP-01 fallback; today we use DNS-01 so it never
    # fires.
    # ─────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.digitalbadges.scot *.digitalbadges.scot;

        location /.well-known/acme-challenge/ {
            # Reserved for ACME HTTP-01 fallback. Currently unused.
            return 404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Default :80 catch-all (apex + unknown hosts) - keep the 404 behaviour
    # instead of redirecting unknown hosts.
    server {
        listen 80 default_server;
        server_name _;
        return 404;
    }

    # ─────────────────────────────────────────────────────────────────────
    # :443 - api.digitalbadges.scot -> transaction-service
    # ─────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name api.digitalbadges.scot;

        ssl_certificate     /etc/nginx/certs/digitalbadges.scot.fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/digitalbadges.scot.key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        # No long-lived browser HTTPS-only preload policy in v1; see README (TLS).
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://transaction_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # ─────────────────────────────────────────────────────────────────────
    # :443 - *.digitalbadges.scot -> orca (any tenant subdomain)
    # ─────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name *.digitalbadges.scot;

        ssl_certificate     /etc/nginx/certs/digitalbadges.scot.fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/digitalbadges.scot.key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        # Same browser preload policy deferral as the api server block; see README (TLS).
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location = /healthz {
            access_log off;
            proxy_pass http://orca/healthz;
        }

        location / {
            proxy_pass http://orca;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # Default :443 catch-all (apex + unknown HTTPS) -- needs the cert too
    # because nginx must complete the TLS handshake before it can reply
    # 404. The wildcard cert covers the apex.
    server {
        listen 443 ssl default_server;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/digitalbadges.scot.fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/digitalbadges.scot.key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        return 404;
    }
}
